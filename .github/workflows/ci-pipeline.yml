name: Sakila CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: "sakila-app"
  DB_PASSWORD: "admin"

jobs:
  # Job 1: Code Quality Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        # Requirement: Max line 120, ignore E501 and W503
        run: flake8 . --max-line-length=120 --ignore=E501,W503

  # Job 2: Unit Tests with MySQL Service
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.DB_PASSWORD }}
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # Challenge Element: Import Sakila Data manually
      - name: Import Sakila Data
        run: |
          mysql -h 127.0.0.1 -uroot -p${{ env.DB_PASSWORD }} -e "USE sakila; CREATE TABLE IF NOT EXISTS actor (actor_id INT AUTO_INCREMENT PRIMARY KEY, first_name VARCHAR(45), last_name VARCHAR(45), last_update TIMESTAMP DEFAULT CURRENT_TIMESTAMP); INSERT INTO actor (first_name, last_name) VALUES ('SHAHMEER', 'GILL');"

      - name: Run pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ env.DB_PASSWORD }}
          MYSQL_DB: sakila
        run: pytest -v

  # Job 3: Docker Build & Verification
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify image creation
        run: docker images
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name smoke-test ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl --retry 5 --retry-connrefused http://localhost:5000 || exit 1

  # Job 4: Image Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt'
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt