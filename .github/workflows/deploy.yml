name: Deployment Workflow

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging Environment..."
          echo "DB_HOST=staging-db.sakila.internal"
          echo "APP_PORT=5000"
          echo "IMAGE_TAG=staging-${{ github.sha }}"
      
      - name: Generate Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "* **Status:** Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "* **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "* **Deployment Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "* **Image:** sakila-app:staging-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production  # This triggers the manual approval rule
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to Production Environment..."
          echo "Environment: PRODUCTION"
          echo "Status: LIVE"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}.${{ github.run_id }}
          release_name: Release v$(date +'%Y.%m.%d')
          draft: false
          prerelease: false

      - name: Notify Slack
        run: echo "Slack notification: Deployment to production successful"