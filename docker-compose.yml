version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sakila-db-compose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sakila-app-compose
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DB: ${DB_NAME}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    ports:
      - "8081:8080"
    networks:
      - sakila-network
    depends_on:
      - db

  test-runner:
    build: .
    profiles:
      - test
    command: python -m pytest tests/ -v
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data: